name: Build SL3000 Firmware (Ultimate v4.x)

on:
  workflow_dispatch:

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  WORKDIR: src   # 外部源码仓库目录

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # 1. Checkout 当前仓库（用于打 tag 和发布 Release）
    - name: Checkout current repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Checkout 外部源码仓库 (ykm888/immortalwrt)
    - name: Checkout immortalwrt (ykm888)
      uses: actions/checkout@v4
      with:
        repository: ykm888/immortalwrt
        ref: openwrt-24.10
        path: src
        fetch-depth: 0
        submodules: recursive

    # 打印分支信息
    - name: Print branches
      run: |
        echo "=== 当前仓库分支 ==="
        git branch
        echo "=== 外部源码分支 ==="
        cd "$WORKDIR"
        git branch

    # 清理磁盘空间
    - name: Free disk space
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo apt-get clean
        df -h

    # 清理编译环境
    - name: Clean build environment
      working-directory: ${{ env.WORKDIR }}
      run: |
        rm -rf build_dir tmp
        find dl -type f -size +50M -print -delete || true
        CCACHE_SIZE=$(du -s "$CCACHE_DIR" 2>/dev/null | awk '{print $1}')
        if [ -n "$CCACHE_SIZE" ] && [ "$CCACHE_SIZE" -gt 3000000 ]; then
          ccache -C || true
        fi
        df -h

    # 安装依赖
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-distutils rsync unzip zlib1g-dev file wget ccache

    # 缓存 DL
    - name: Cache DL
      uses: actions/cache@v4
      with:
        path: ${{ env.WORKDIR }}/dl
        key: dl-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          dl-${{ github.ref_name }}-

    # 缓存 ccache
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-${{ github.ref_name }}

    # 缓存工具链
    - name: Cache toolchain
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.WORKDIR }}/staging_dir
          ${{ env.WORKDIR }}/toolchain
          ${{ env.WORKDIR }}/build_dir/toolchain-*
        key: toolchain-${{ github.ref_name }}
        restore-keys: |
          toolchain-

    # 设置 ccache
    - name: Setup ccache
      run: |
        ccache -M 2G
        ccache -s || true

    # 修剪工具链缓存
    - name: Trim toolchain cache
      working-directory: ${{ env.WORKDIR }}
      run: |
        find staging_dir -type f -name "*.o" -delete || true
        find staging_dir -type f -name "*.a" -size +10M -delete || true
        find build_dir -maxdepth 1 -type d -name "toolchain-*" -exec rm -rf {}/tmp \; || true

    # 应用 SL3000 配置（直接用外部仓库 configs/sl3000.config）
    - name: Apply SL3000 config
      working-directory: ${{ env.WORKDIR }}
      run: |
        echo "=== 使用外部仓库 configs/sl3000.config ==="
        cp configs/sl3000.config .config
        make oldconfig
        tail -n 50 .config
        if ! grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_siluo_sl3000=y" .config; then
          echo "ERROR: SL3000 未启用!"
          exit 1
        fi
        echo "SL3000 配置 OK"

    # 更新 feeds（外部仓库自带）
    - name: Update feeds
      working-directory: ${{ env.WORKDIR }}
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 下载源码
    - name: Download sources
      working-directory: ${{ env.WORKDIR }}
      run: make download -j8 || make download -j1 V=s

    # 编译固件
    - name: Build firmware
      working-directory: ${{ env.WORKDIR }}
      run: |
        mkdir -p ../logs
        BUILD_LOG=../logs/build.log
        make -j$(nproc) V=s | tee "$BUILD_LOG" || make -j1 V=s | tee -a "$BUILD_LOG"

    # 检查固件输出
    - name: Check firmware output
      working-directory: ${{ env.WORKDIR }}
      run: |
        TARGET_DIR=bin/targets/mediatek/filogic
        ls -lh "$TARGET_DIR"
        ls "$TARGET_DIR"/*sysupgrade*.img.gz >/dev/null 2>&1

    # 生成 SHA256
    - name: Generate SHA256
      working-directory: ${{ env.WORKDIR }}/bin/targets/mediatek/filogic
      run: |
        FILES=$(find . -maxdepth 1 -type f)
        sha256sum $FILES > sha256sums.txt
        ls -lh

    # 上传固件产物
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: sl3000-firmware
        path: src/bin/targets/mediatek/filogic/

    # 上传日志
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sl3000-build-logs
        path: logs/

    # 创建 Tag（在你自己的仓库）
    - name: Create tag
      run: |
        TAG=sl3000-${{ github.ref_name }}-r${{ github.run_number }}-${{ github.sha }}
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "$TAG"
        git push origin "$TAG"

    # 创建 Release（在你自己的仓库）
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: sl3000-${{ github.ref_name }}-r${{ github.run_number }}-${{ github.sha }}
        name: SL3000 ${{ github.ref_name }} r${{ github.run_number }}
        draft: false
        prerelease: false
        body: |
          SL3000 自动构建固件 (Ultimate v4.x)

          - 源码仓库: ykm888/immortalwrt
          - 分支: openwrt-24.10
          - 设备: Siluo SL3000 (mediatek filogic)
          - 运行编号: ${{ github.run_number }}
          - 提交: ${{ github.sha }}
          - 构建时间: ${{ github.run_started_at }}

    # 上传 Release 产物
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src/bin/targets/mediatek/filogic/*sysupgrade*.img.gz
          src/bin/targets/mediatek/filogic/*factory*.img
          src/bin/targets/mediatek/filogic/sha256sums.txt
          src/bin/targets/mediatek/filogic/*.tar.gz
