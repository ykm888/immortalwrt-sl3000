name: Build ImmortalWrt SL-3000 (eMMC 128G)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要编译的 ImmortalWrt 分支"
        required: true
        default: "openwrt-24.10"
      device:
        description: "设备型号"
        required: true
        default: "sl-3000"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 1. 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/lib/jvm
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: 2. Checkout ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: ykm99999/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: 3. 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ make libncurses5-dev \
            libncursesw5-dev zlib1g-dev gawk git gettext unzip file libssl-dev \
            wget python3 rsync ccache parted e2fsprogs gpg python3-pip
          python3 -m pip install --user packaging

      - name: 4. 安装最新 CMake (>=3.31)
        run: |
          sudo apt-get purge -y cmake || true
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc | sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main" | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update
          sudo apt-get install -y cmake
          cmake --version

      - name: 5. Checkout overlay
        uses: actions/checkout@v4
        with:
          repository: ykm888/immortalwrt-sl3000
          path: overlay

      - name: 6. 应用 overlay
        run: |
          cp overlay/target/linux/mediatek/dts/mt7981-siluo-sl3000.dts target/linux/mediatek/dts/
          cp overlay/target/linux/mediatek/image/mt7981.mk target/linux/mediatek/image/
          cp -r overlay/files ./files
          cp overlay/sl3000.config .config
          echo "✅ 使用 sl3000.config"
          grep siluo_sl3000 .config || { echo "❌ 配置文件未选择设备"; exit 1; }

      - name: 7. 更新 feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 8. 下载源码
        run: make download -j$(nproc)

      - name: 9. Defconfig
        run: make defconfig

      - name: 10. 编译固件
        run: |
          CMAKE=/usr/bin/cmake HOST_CMAKE=/usr/bin/cmake make -j$(nproc) || \
          CMAKE=/usr/bin/cmake HOST_CMAKE=/usr/bin/cmake make -j1 V=s

      - name: 11. 收集固件
        run: |
          mkdir -p bin/firmware
          find bin/targets -type f \( -name "*.bin" -o -name "*.img*" \) -exec cp -v {} bin/firmware/ \;
          echo "--- 固件目录 ---"
          ls -lh bin/firmware || true
          COUNT=$(find bin/firmware -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ 没有生成固件，请检查 .config 和 mt7981.mk 是否正确"
            exit 1
          fi

      - name: 12. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.device }}-emmc-firmware
          path: bin/firmware/*

      - name: 13. 发布固件
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.device }}-${{ github.event.inputs.branch }}-$(date +%Y%m%d)
          name: "ImmortalWrt 固件 - ${{ github.event.inputs.device }} (eMMC)"
          files: bin/firmware/*

      - name: 14. 清理旧 release
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
