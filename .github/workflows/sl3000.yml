name: Build ImmortalWrt SL-3000 (eMMC 128G)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要编译的 ImmortalWrt 分支"
        required: true
        default: "openwrt-24.10"
      device:
        description: "设备型号 (例如: sl-3000)"
        required: true
        default: "sl-3000"
      mode:
        description: "编译模式 (minimal 或 luci)"
        required: true
        default: "luci"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: ykm99999/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/lib/jvm
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ make libncurses5-dev \
            libncursesw5-dev zlib1g-dev gawk git gettext unzip file libssl-dev \
            wget python3 rsync ccache parted e2fsprogs software-properties-common \
            wget gpg

      - name: Install latest CMake from Kitware (>=3.31)
        run: |
          sudo apt-get purge -y cmake || true
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc | sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main" | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Enable ccache
        run: |
          echo 'export PATH="/usr/lib/ccache:$PATH"' >> $GITHUB_ENV
          echo 'export CCACHE_DIR=$HOME/.ccache' >> $GITHUB_ENV
          echo 'export CCACHE_COMPRESS=1' >> $GITHUB_ENV
          echo 'export CCACHE_MAXSIZE=2G' >> $GITHUB_ENV

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Replace LuCI with your repo
        run: |
          rm -rf feeds/luci
          git clone https://github.com/ykm99999/luci feeds/luci

      - name: Copy device config
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          MODE="${{ github.event.inputs.mode }}"
          FILE="configs/${DEVICE}-${MODE}.config"
          if [ -f "$FILE" ]; then
            cp "$FILE" .config
            echo "✅ 使用 $FILE"
          else
            echo "❌ 没有设备配置文件，退出"
            exit 1
          fi

      - name: Verify custom files
        run: |
          test -f files/etc/fstab || (echo "❌ fstab missing" && exit 1)
          test -f files/etc/uci-defaults/99-docker-mount || (echo "❌ docker mount script missing" && exit 1)

      - name: Defconfig
        run: make defconfig

      - name: Build firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Rename firmware files
        run: |
          DATE=$(date +%Y%m%d)
          DEVICE="${{ github.event.inputs.device }}"
          BRANCH="${{ github.event.inputs.branch }}"
          MODE="${{ github.event.inputs.mode }}"
          for f in bin/targets/*/*/*.bin; do
            if [[ $f == *"sysupgrade"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-${MODE}-emmc-${DATE}-sysupgrade.bin"
            elif [[ $f == *"initramfs"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-${MODE}-emmc-${DATE}-initramfs.bin"
            fi
          done
          ls -lh bin/targets/*/*.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.device }}-${{ github.event.inputs.mode }}-emmc-firmware
          path: bin/targets/*.bin

      - name: Release firmware
        uses: softprops/action-gh-release@v1
        with:
          files: bin/targets/*.bin
          name: "ImmortalWrt 固件 - ${{ github.event.inputs.device }} (eMMC, ${{ github.event.inputs.branch}}, ${{ github.event.inputs.mode }})"
          tag_name: "${{ github.event.inputs.device }}-${{ github.event.inputs.branch }}-${{ github.event.inputs.mode }}-emmc-$(date +%Y%m%d)"

      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
