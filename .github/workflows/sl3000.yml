name: Build ImmortalWrt SL-3000 (eMMC 128G)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要编译的 ImmortalWrt 分支"
        required: true
        default: "openwrt-24.10"
      device:
        description: "设备型号"
        required: true
        default: "sl-3000"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 1. 清理磁盘空间
        run: |
          echo "=== 清理前磁盘空间 ==="
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/lib/jvm
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /tmp/*
          sudo docker system prune -af || true
          sudo docker rmi $(docker images -q) || true
          echo "=== 清理后磁盘空间 ==="
          df -h

      - name: 2. Checkout ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: ykm99999/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: 3. 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ make libncurses5-dev \
            libncursesw5-dev zlib1g-dev gawk git gettext unzip file libssl-dev \
            wget python3 rsync ccache parted e2fsprogs gpg python3-pip xz-utils zip libelf-dev time
          python3 -m pip install --user packaging

      - name: 4. 安装指定版本 CMake (3.30.5)
        run: |
          sudo apt-get purge -y cmake || true
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ jammy main" | \
            sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update
          sudo apt-get install -y cmake=3.30.5-*
          hash -r
          cmake --version

      - name: 5. Checkout overlay
        uses: actions/checkout@v4
        with:
          repository: ykm888/immortalwrt-sl3000
          path: overlay

      - name: 6. 应用 overlay 并校验设备选择
        run: |
          cp overlay/target/linux/mediatek/dts/mt7981-siluo-sl3000.dts target/linux/mediatek/dts/
          cp overlay/target/linux/mediatek/image/mt7981.mk target/linux/mediatek/image/
          cp -r overlay/files ./files
          cp overlay/sl3000.config .config
          echo "✅ 使用 sl3000.config"
          echo "=== .config (前40行) ==="; head -n 40 .config
          make defconfig
          grep -q 'CONFIG_TARGET_mediatek_mt7981=y' .config || { echo "❌ 未选择 mt7981 子平台"; exit 1; }
          grep -q 'CONFIG_TARGET_mediatek_mt7981_DEVICE_siluo_sl3000=y' .config || { echo "❌ 未选择 siluo_sl3000 设备"; exit 1; }

      - name: 7. 更新 feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: 8. 下载源码
        run: |
          make download -j$(nproc) || make download -j1 V=s
          echo "=== 下载后磁盘空间 ==="
          df -h
          du -sh dl/* || true

      - name: 9. Defconfig
        run: make defconfig

      - name: 10. 强制使用系统 CMake 并清理 host cmake
        run: |
          rm -f staging_dir/host/bin/cmake || true
          rm -rf staging_dir/host/*cmake* || true
          echo "System cmake -> $(which cmake)"
          cmake --version

      - name: 11. 编译固件
        run: |
          echo "=== 编译前磁盘空间 ==="
          df -h
          CMAKE=/usr/bin/cmake HOST_CMAKE=/usr/bin/cmake make -j$(nproc) IGNORE_ERRORS=m || \
          CMAKE=/usr/bin/cmake HOST_CMAKE=/usr/bin/cmake make -j1 V=s IGNORE_ERRORS=m
          echo "=== 编译后磁盘空间 ==="
          df -h
          du -sh ./build_dir/* || true

      - name: 12. 收集固件
        run: |
          mkdir -p bin/firmware
          find bin/targets -type f \( -name "*.bin" -o -name "*.bin.gz" -o -name "*.img" -o -name "*.img.gz" -o -name "*.tar.gz" \) -exec cp -v {} bin/firmware/ \;
          echo "--- 原始固件目录结构 ---"; ls -R bin/targets || true
          echo "--- 收集后的固件 ---"; ls -lh bin/firmware || true
          sha256sum bin/firmware/* || true
          COUNT=$(find bin/firmware -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ 没有生成固件。检查：1) .config 设备选择；2) mt7981.mk 的 TARGET_DEVICES/IMAGE 规则；3) 上方 V=s 包编译是否失败"
            exit 1
          fi

      - name: 13. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.device }}-emmc-firmware
          path: bin/firmware/*
          retention-days: 7

      - name: 14. 计算动态标签名
        id: tag_calc
        shell: bash
        run: |
          DATE_TAG=$(date +%Y%m%d)
          SHORT_HASH=$(git rev-parse --short HEAD)
          FULL_TAG="${{ github.event.inputs.device }}-${{ github.event.inputs.branch }}-${SHORT_HASH}-${DATE_TAG}"
          echo "tag=${FULL_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=ImmortalWrt 固件 - ${{ github.event.inputs.device }} (eMMC, ${{ github.event.inputs.branch }})" >> "$GITHUB_OUTPUT"
          echo "Computed tag: ${FULL_TAG}"

      - name: 15. 发布固件
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_calc.outputs.tag }}
          name: ${{ steps.tag_calc.outputs.release_name }}
          files: bin/firmware/*
          draft: false
          prerelease: false

      - name: 16. 清理旧 release
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
