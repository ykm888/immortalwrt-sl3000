name: Build ImmortalWrt SL-3000 (eMMC 128G)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要编译的 ImmortalWrt 分支"
        required: true
        default: "openwrt-24.10"
      device:
        description: "设备型号"
        required: true
        default: "sl-3000"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/lib/jvm
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: ykm99999/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Checkout overlay repo
        uses: actions/checkout@v4
        with:
          repository: ykm888/immortalwrt-sl3000
          path: overlay

      - name: Apply overlay (DTS, mk, files, config)
        run: |
          cp overlay/target/linux/mediatek/dts/mt7981-siluo-sl3000.dts target/linux/mediatek/dts/
          cp overlay/target/linux/mediatek/image/mt7981.mk target/linux/mediatek/image/
          cp -r overlay/files ./files
          cp overlay/sl3000.config .config
          echo "✅ 使用根目录的 sl3000.config"

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Enable ccache
        run: |
          echo 'export PATH="/usr/lib/ccache:$PATH"' >> $GITHUB_ENV
          echo 'export CCACHE_DIR=$HOME/.ccache' >> $GITHUB_ENV
          echo 'export CCACHE_COMPRESS=1' >> $GITHUB_ENV
          echo 'export CCACHE_MAXSIZE=2G' >> $GITHUB_ENV

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download sources
        run: make download -j$(nproc)

      - name: Defconfig
        run: make defconfig

      - name: Build firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Rename firmware files
        run: |
          DATE=$(date +%Y%m%d)
          DEVICE="${{ github.event.inputs.device }}"
          BRANCH="${{ github.event.inputs.branch }}"
          for f in bin/targets/*/*/*.bin; do
            if [[ $f == *"sysupgrade"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-emmc-${DATE}-sysupgrade.bin"
            elif [[ $f == *"initramfs"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-emmc-${DATE}-initramfs.bin"
            fi
          done

      - name: Cleanup build artifacts
        run: |
          rm -rf bin/packages build_dir staging_dir
          df -h

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.device }}-emmc-firmware
          path: bin/targets/*.bin

      - name: Release firmware
        uses: softprops/action-gh-release@v1
        with:
          files: bin/targets/*.bin
          name: "ImmortalWrt 固件 - ${{ github.event.inputs.device }} (eMMC, ${{ github.event.inputs.branch}})"
          tag_name: "${{ github.event.inputs.device }}-${{ github.event.inputs.branch }}-emmc-$(date +%Y%m%d)"

      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
