name: Build & Release Siluo SL-3000 Firmware (24.10, Kernel 6.6)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 清理磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        df -h

    - name: 拉取仓库
      uses: actions/checkout@v4

    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget curl unzip \
          libncurses5-dev libncursesw5-dev zlib1g-dev gawk flex gettext \
          libssl-dev python3 python3-distutils rsync

    - name: 克隆 ImmortalWrt 24.10
      run: |
        git clone https://github.com/ykm99999/immortalwrt.git
        cd immortalwrt
        git checkout v24.10.0   # 锁定最新稳定版，内核 6.6
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 替换 LuCI 源码
      run: |
        cd immortalwrt/package
        rm -rf luci
        git clone https://github.com/ykm99999/luci.git luci

    - name: 添加 sl3000-logo 包
      run: |
        mkdir -p immortalwrt/package/sl3000-logo
        cat > immortalwrt/package/sl3000-logo/Makefile << 'EOF'
        include $(TOPDIR)/rules.mk

        PKG_NAME:=sl3000-logo
        PKG_VERSION:=1.0
        PKG_RELEASE:=1

        PKG_BUILD_DIR := $(BUILD_DIR)/$(PKG_NAME)

        include $(INCLUDE_DIR)/package.mk

        define Package/$(PKG_NAME)
          SECTION:=utils
          CATEGORY:=Siluo
          TITLE:=SL-3000 Logo
        endef

        define Build/Prepare
        	mkdir -p $(PKG_BUILD_DIR)
        	cp $(TOPDIR)/logo.jpeg $(PKG_BUILD_DIR)/
        endef

        define Build/Compile
        	true
        endef

        define Package/$(PKG_NAME)/install
        	$(INSTALL_DIR) $(1)/www
        	$(INSTALL_DATA) $(PKG_BUILD_DIR)/logo.jpeg $(1)/www/司徒SL-3000.jpeg
        endef

        $(eval $(call BuildPackage,$(PKG_NAME)))
        EOF

    - name: 清理旧配置
      run: |
        cd immortalwrt
        make distclean

    - name: 生成 .config
      run: |
        cd immortalwrt
        cat > .config << 'EOF'
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7981=y
        CONFIG_TARGET_mediatek_mt7981_DEVICE_siluo_sl3000=y

        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_IMAGES_GZIP=y

        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_wget=y
        CONFIG_PACKAGE_tcpdump=y
        CONFIG_PACKAGE_ipset=y
        CONFIG_PACKAGE_htop=y
        CONFIG_PACKAGE_bash=y
        CONFIG_PACKAGE_nano=y

        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-mod-admin-full=y
        CONFIG_PACKAGE_luci-theme-bootstrap=y

        CONFIG_PACKAGE_luci-app-firewall=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-sqm=y
        CONFIG_PACKAGE_luci-app-ddns=y

        CONFIG_PACKAGE_dockerd=y
        CONFIG_PACKAGE_docker-ce=y
        CONFIG_PACKAGE_docker-cli=y
        CONFIG_PACKAGE_luci-app-dockerman=y

        CONFIG_PACKAGE_kmod-veth=y
        CONFIG_PACKAGE_kmod-bridge=y
        CONFIG_PACKAGE_kmod-xt-overlay=y
        CONFIG_PACKAGE_kmod-nf-nat=y
        CONFIG_PACKAGE_kmod-nf-conntrack=y

        CONFIG_PACKAGE_sl3000-logo=y

        CONFIG_PACKAGE_luci-app-attendedsysupgrade=y
        CONFIG_PACKAGE_rpcd-mod-attendedsysupgrade=y
        EOF

        make defconfig

    - name: 编译固件
      run: |
        cd immortalwrt
        make -j$(nproc) || make -j1 V=s
        echo "===== 编译结果 ====="
        find bin/targets -type f

    - name: 上传固件到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sl3000-firmware
        path: immortalwrt/bin/targets/mediatek/mt7981/

    - name: 发布到 Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: sl3000-${{ github.run_number }}
        name: "Siluo SL-3000 固件发布 #${{ github.run_number }} (24.10, Kernel 6.6)"
        files: immortalwrt/bin/targets/mediatek/mt7981/*/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
