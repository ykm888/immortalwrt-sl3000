name: Build ImmortalWrt SL-3000 (eMMC 128G)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要编译的 ImmortalWrt 分支"
        required: true
        default: "openwrt-24.10"
      device:
        description: "设备型号"
        required: true
        default: "sl-3000"
      mode:
        description: "编译模式 (minimal 或 luci)"
        required: true
        default: "luci"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: ykm99999/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Checkout overlay repo
        uses: actions/checkout@v4
        with:
          repository: ykm888/immortalwrt-sl3000
          path: overlay

      - name: Apply overlay (DTS, mk, files, config)
        run: |
          cp overlay/target/linux/mediatek/dts/mt7981-siluo-sl3000.dts target/linux/mediatek/dts/
          cp overlay/target/linux/mediatek/image/mt7981.mk target/linux/mediatek/image/
          cp -r overlay/files ./files
          DEVICE="${{ github.event.inputs.device }}"
          MODE="${{ github.event.inputs.mode }}"
          cp overlay/configs/${DEVICE}-${MODE}.config .config

      - name: Verify overlay files
        run: |
          test -f target/linux/mediatek/dts/mt7981-siluo-sl3000.dts || (echo "❌ DTS missing" && exit 1)
          test -f target/linux/mediatek/image/mt7981.mk || (echo "❌ mk missing" && exit 1)
          test -f files/etc/fstab || (echo "❌ fstab missing" && exit 1)

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Defconfig
        run: make defconfig

      - name: Build firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Rename firmware files
        run: |
          DATE=$(date +%Y%m%d)
          DEVICE="${{ github.event.inputs.device }}"
          BRANCH="${{ github.event.inputs.branch }}"
          MODE="${{ github.event.inputs.mode }}"
          for f in bin/targets/*/*/*.bin; do
            if [[ $f == *"sysupgrade"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-${MODE}-emmc-${DATE}-sysupgrade.bin"
            elif [[ $f == *"initramfs"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-${MODE}-emmc-${DATE}-initramfs.bin"
            fi
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.device }}-${{ github.event.inputs.mode }}-emmc-firmware
          path: bin/targets/*.bin

      - name: Release firmware
        uses: softprops/action-gh-release@v1
        with:
          files: bin/targets/*.bin
          name: "ImmortalWrt 固件 - ${{ github.event.inputs.device }} (eMMC, ${{ github.event.inputs.branch}}, ${{ github.event.inputs.mode }})"
          tag_name: "${{ github.event.inputs.device }}-${{ github.event.inputs.branch }}-${{ github.event.inputs.mode }}-emmc-$(date +%Y%m%d)"

      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
