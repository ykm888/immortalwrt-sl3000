name: Build ImmortalWrt SL-3000 (eMMC 128G)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要编译的 ImmortalWrt 分支"
        required: true
        default: "openwrt-24.10"
      device:
        description: "设备型号"
        required: true
        default: "sl-3000"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 1. ⚡ 激进磁盘空间清理
        run: |
          echo "--- 释放磁盘空间 ---"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/lib/jvm
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: 2. Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: ykm99999/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: 3. 安装基础编译依赖 (修复缺失的步骤)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ make libncurses5-dev \
            libncursesw5-dev zlib1g-dev gawk git gettext unzip file libssl-dev \
            wget python3 rsync ccache parted e2fsprogs

      - name: 4. Checkout overlay repo
        uses: actions/checkout@v4
        with:
          repository: ykm888/immortalwrt-sl3000
          path: overlay

      - name: 5. Apply overlay (DTS, mk, files, config)
        run: |
          cp overlay/target/linux/mediatek/dts/mt7981-siluo-sl3000.dts target/linux/mediatek/dts/
          cp overlay/target/linux/mediatek/image/mt7981.mk target/linux/mediatek/image/
          cp -r overlay/files ./files
          cp overlay/sl3000.config .config
          echo "✅ 使用根目录的 sl3000.config"

      - name: 6. Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: 7. Enable ccache
        run: |
          echo 'export PATH="/usr/lib/ccache:$PATH"' >> $GITHUB_ENV
          echo 'export CCACHE_DIR=$HOME/.ccache' >> $GITHUB_ENV
          echo 'export CCACHE_COMPRESS=1' >> $GITHUB_ENV
          echo 'export CCACHE_MAXSIZE=2G' >> $GITHUB_ENV

      - name: 8. Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 9. Download sources
        run: make download -j$(nproc)

      - name: 10. Defconfig
        run: make defconfig

      - name: 11. Build firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: 12. Rename firmware files (用于简化上传路径)
        run: |
          DATE=$(date +%Y%m%d)
          DEVICE="${{ github.event.inputs.device }}"
          BRANCH="${{ github.event.inputs.branch }}"
          for f in bin/targets/*/*/*.bin; do
            if [[ $f == *"sysupgrade"* ]]; then
              # 重命名到顶层 bin/targets/ 目录
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-emmc-${DATE}-sysupgrade.bin"
            elif [[ $f == *"initramfs"* ]]; then
              mv "$f" "bin/targets/${DEVICE}-${BRANCH}-emmc-${DATE}-initramfs.bin"
            fi
          done
          echo "--- 检查重命名后的文件 ---"
          ls -lh bin/targets/

      - name: 13. Cleanup build artifacts
        run: |
          rm -rf bin/packages build_dir staging_dir
          df -h

      - name: 14. Upload firmware (路径已修复)
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.device }}-emmc-firmware
          # 现在文件在 bin/targets/ 目录下，路径正确
          path: bin/targets/*.bin 

      - name: 15. 计算动态标签名 (修复标签无效问题)
        id: tag_calc # 增加 ID 以便引用输出
        run: |
          # 提前执行 Shell 命令计算出正确的日期标签
          DATE_TAG=$(date +%Y%m%d)
          FULL_TAG="${{ github.event.inputs.device }}-${{ github.event.inputs.branch }}-emmc-${DATE_TAG}"
          echo "tag=$FULL_TAG" >> $GITHUB_OUTPUT # 导出标签名

      - name: 16. Release firmware (标签和文件路径已修复)
        uses: softprops/action-gh-release@v1
        with:
          # 引用上一步计算的有效标签名
          tag_name: ${{ steps.tag_calc.outputs.tag }} 
          name: "ImmortalWrt 固件 - ${{ github.event.inputs.device }} (eMMC, ${{ github.event.inputs.branch}})"
          # 文件路径已修复
          files: bin/targets/*.bin 
          # 使用 ${{ secrets.GITHUB_TOKEN }}

      - name: 17. Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
